version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4081:4081"
    environment:
      - NODE_ENV=production
      - PORT=4081
      - JWT_SECRET=your-secret-key-change-in-production
    volumes:
      - ./backend/database:/app/database
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4080:80"
    depends_on:
      - backend
    restart: unless-stopped
