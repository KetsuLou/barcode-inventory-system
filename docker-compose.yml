services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4080:4080"
    volumes:
      - ./backend/database:/app/backend/database
      - ./backend/uploads:/app/backend/uploads
    environment:
      - NODE_ENV=production
      - PORT=4080
      - JWT_SECRET=your-strong-secret-key-change-in-production
    restart: unless-stopped